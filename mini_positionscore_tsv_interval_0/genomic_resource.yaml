---

type: position_score

table:
  filename: mini_positionscore_interval_tsv_0.tsv
  header_mode: none
  zero_based: True

  chrom:
    index: 0
  pos_begin:
    index: 1
  pos_end:
    index: 2

# score values
scores:
  - id: posint_tsv_0
    type: float
    desc: "Toy 0-based numeric interval position score from an uncompressed TSV file"
    large_values_desc: "more"
    small_values_desc: "less"
    index: 3
    histogram:
      type: number
      number_of_bins: 10
      view_range:
        min: 0.0
        max: 1.0
      y_log_scale: True


meta:
  summary: |
    0-based tsv position score (interval)

  description: |
    This toy position score resource demonstrates how genomic scores can be stored in an uncompressed tab-separated file with chromosome, start, end, and score columns. The file has no header and uses 0-based coordinates on the mini genome. The fourth column contains the numeric score assigned to each region.

    This resource contains the same toy position-score information as the accompanying 1-based interval TSV position score resource, ``mini_positionscore_tsv_interval_1``, but stores coordinates using 0-based positions.

    Data:

    | Chromosome | Start | End | Score |
    |:----------:|:-----:|:---:|:-----:|
    | chr1 | 0 | 5 | 0.0 |
    | chr1 | 5 | 10 | 0.1 |
    | chr2 | 0 | 5 | 0.2 |
    | chr2 | 5 | 10 | 0.3 |