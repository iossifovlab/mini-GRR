---

type: position_score

table:
  filename: mini_positionscore_tsv_1.tsv
  header_mode: none

  # defined by score_type
  chrom:
    index: 0
  pos_begin:
    index: 1
  pos_end:
    index: 1

# score values
scores:
  - id: pos_tsv_1
    type: float
    desc: "Toy 1-based numeric position score from an uncompressed TSV file"
    large_values_desc: "more"
    small_values_desc: "less"
    index: 2
    histogram:
      type: number
      number_of_bins: 10
      view_range:
        min: 0.0
        max: 1.0
      y_log_scale: True

  - id: pos_tsv_1_st
    type: str
    desc: "Toy 0-based categorical position score from an uncompressed TSV file"
    index: 3
    na_values: [""]
    histogram:
      type: categorical


meta:
  summary: |
    1-based tsv position score resource with two scores

  description: |
    This toy position score resource demonstrates how two per-position genomic scores can be stored in a single uncompressed tab-separated file. The file has no header and contains four columns: chromosome, 1-based position, numeric score, and categorical score. The numeric score is read as `pos_tsv_1`, and the categorical score is read as `pos_tsv_1_st`. Empty categorical values are treated as missing values.

    This resource uses 1-based positions on the mini genome and extends the simpler TSV position-score examples by including both a numeric and a categorical score column.

    Data, shown in compact form:

    | Position | chr1 numeric | chr1 category | chr2 numeric | chr2 category |
    |:--------:|:------------:|:-------------:|:------------:|:-------------:|
    | 1 | 0.0 | good | 0.0 | good |
    | 2 | 0.1 | good | 0.1 | bad |
    | 3 | 0.2 | good | 0.2 | bad |
    | 4 | — | — | 0.3 | bad |
    | 5 | 0.4 | good | 0.4 | bad |
    | 6 | 0.5 | good | 0.5 | bad |
    | 7 | 0.6 | — | 0.6 | bad |
    | 8 | 0.7 | bad | 0.7 | bad |
    | 9 | — | bad | 0.8 | bad |
    | 10 | 0.9 | good | 0.9 | bad |