---

type: position_score

table:
  filename: mini_positionscore_interval_tabix_1.tsv.gz
  format: tabix
  header_mode: none

  # defined by score_type
  chrom:
    index: 0
  pos_begin:
    index: 1
  pos_end:
    index: 2

# score values
scores:
  - id: posint_tabix_1
    type: float
    desc: "Toy numeric 1-based interval position score from a tabix-indexed TSV file"
    large_values_desc: "more"
    small_values_desc: "less"
    index: 3
    histogram:
      type: number
      number_of_bins: 10
      view_range:
        min: 0.0
        max: 1.0
      y_log_scale: True


meta:
  summary: |
    1-based tabix position score (interval)

  description: |
    This toy position score resource demonstrates how genomic scores can be stored in a tab-separated file with chromosome, start, end, and score columns, and queried as a tabix-indexed resource. The file has no header and uses 1-based coordinates on the mini genome. The fourth column contains the numeric score assigned to each region.

    This resource contains the same toy position-score information as the accompanying 0-based interval position score resource, ``mini_positionscore_tabix_interval_0``, but stores coordinates using 1-based positions.

    The accompanying ``dataprep.sh`` script compresses ``mini_positionscore_interval_tabix_1.tsv`` with ``bgzip`` and creates a tabix index using the chromosome, start, and end columns.

    data:

    | Chromosome | Start | End | Score |
    |:----------:|:-----:|:---:|:-----:|
    | chr1 | 1 | 5 | 0.0 |
    | chr1 | 6 | 10 | 0.1 |
    | chr2 | 1 | 5 | 0.2 |
    | chr2 | 6 | 10 | 0.3 |