type: gene_score
filename: mini_genescore.csv.gz
scores:
  - id: my_genescore
    desc: Toy numeric gene score
    histogram:
      type: number
      number_of_bins: 3
      view_range:
        min: 1
        max: 4
      x_log_scale: false
      y_log_scale: false
    small_values_desc: "small"
    large_values_desc: "large"
meta:
  summary: |
    Toy gene score resource
  description: |
    This toy gene score resource demonstrates how gene-level annotations can be stored in a gzip-compressed CSV file keyed by gene name. It includes a minimal example gene with supporting metadata columns and a numeric gene score.