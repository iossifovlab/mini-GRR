---

type: position_score

table:
  filename: mini_positionscore_bedgraph_0.bedgraph.gz
  format: tabix
  header_mode: none
  zero_based: True

  # defined by score_type
  chrom:
    index: 0
  pos_begin:
    index: 1
  pos_end:
    index: 2

# score values
scores:
  - id: pos_bedgraph_0
    type: float
    desc: "Toy numeric position score from a bedgraph file"
    large_values_desc: "more"
    small_values_desc: "less"
    index: 3
    histogram:
      type: number
      number_of_bins: 100
      view_range:
        min: 0.0
        max: 1.0
      y_log_scale: True


meta:
  summary: |
    0-based bedgraph position score resource
    

  description: |
    This toy position score resource demonstrates how per-position genomic scores can be stored in a bedGraph file and queried as a tabix-indexed resource. The file uses 0-based coordinates on the mini genome, with one score for each position on chr1 and chr2. The fourth column contains the numeric score assigned to each position.

    The accompanying dataprep.sh script compresses mini\_positionscore\_bedgraph\_0.bedgraph with bgzip and creates a tabix index using tabix -p bed.