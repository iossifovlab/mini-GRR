---

type: allele_score

table:
  filename: mini_allelescore_tabix_0.tsv.gz
  format: tabix
  zero_based: True

  chrom:
    name: chrom
  pos_begin:
    name: pos
  pos_end:
    name: pos
  reference:
    name: ref
  alternative:
    name: alt

# score values
scores:
  - id: allele_tsv_0_num
    name: an_allele_score
    type: float
    desc: |
      Toy numeric allele score
    large_values_desc: "more"
    small_values_desc: "less"
    histogram:
      type: number
      number_of_bins: 100
      view_range:
        min: 1
        max: 3
      
  - id: allele_tsv_0_cat
    name: a_class
    type: str
    desc: |
      Toy categorical allele score
    histogram:
      type: categorical


meta:
  summary: |

    0-based tabix-indexed TSV allele score resource

  description: |

    This toy allele score resource demonstrates how allele-level scores can be stored in a tabix-indexed TSV file using 0-based coordinates. Each row represents a specific allele defined by chromosome, position, reference allele, and alternative allele, and provides both a numeric allele score and a categorical allele class.


