---

type: position_score

table:
  filename: mini_positionscore_tsv_0.tsv
  zero_based: True

  chrom:
    index: 0
  pos_begin:
    index: 1
  pos_end:
    index: 1

# score values
scores:
  - id: pos_tsv_0
    type: float
    desc: "Toy 0-based numeric position score from an uncompressed TSV file"
    large_values_desc: "more"
    small_values_desc: "less"
    index: 2
    histogram:
      type: number
      number_of_bins: 10
      view_range:
        min: 0.0
        max: 1.0
      y_log_scale: True


meta:
  summary: |
    0-based tsv position score

  description: |
    
    This toy position score resource demonstrates how per-position genomic scores can be stored in an uncompressed tab-separated file. The file has no header and contains three columns: chromosome, 0-based position, and numeric score. The score applies to the specified position on the mini genome.

    This resource contains the same toy position-score information as the accompanying 1-based TSV position score resource, ``mini_positionscore_tsv_1``, but stores positions using 0-based coordinates.

    Data, shown in compact form:

    | Position | chr1 score | chr2 score |
    |:--------:|:----------:|:----------:|
    | 0 | 0.0 | 0.0 |
    | 1 | 0.1 | 0.1 |
    | 2 | 0.2 | 0.2 |
    | 3 | 0.3 | 0.3 |
    | 4 | 0.4 | 0.4 |
    | 5 | 0.5 | 0.5 |
    | 6 | 0.6 | 0.6 |
    | 7 | 0.7 | 0.7 |
    | 8 | 0.8 | 0.8 |
    | 9 | 0.9 | 0.9 |